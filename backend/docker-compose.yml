version: '3.8'

services:
  # MySQL Database for master_db (Auth)
  mysql-master:
    image: mysql:8.0
    container_name: ecom-mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: P@ssw0rd123
      MYSQL_DATABASE: master_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_master_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL Database for business_db
  mysql-business:
    image: mysql:8.0
    container_name: ecom-mysql-business
    environment:
      MYSQL_ROOT_PASSWORD: P@ssw0rd123
      MYSQL_DATABASE: business_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_business_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ecom-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ecom-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # API Gateway (Port 5000)
  api-gateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    container_name: ecom-api-gateway
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Jwt__SecretKey=Ecom_Microservice_SecretKey_MustBeAtLeast32Characters!2026
      - Jwt__Issuer=Ecom.AuthApi
      - Jwt__Audience=Ecom.Client
      - Services__AuthApi=http://auth-api:5001
      - Services__BusinessApi=http://business-api:5002
      - Services__OrderApi=http://order-api:5003
    depends_on:
      - auth-api
      - business-api
      - order-api

  # Auth API (Port 5001)
  auth-api:
    build:
      context: .
      dockerfile: AuthApi/Dockerfile
    container_name: ecom-auth-api
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5001
      - ConnectionStrings__Default=Server=mysql-master;Database=master_db;User=root;Password=P@ssw0rd123;
      - Jwt__SecretKey=Ecom_Microservice_SecretKey_MustBeAtLeast32Characters!2026
      - Jwt__Issuer=Ecom.AuthApi
      - Jwt__Audience=Ecom.Client
    depends_on:
      mysql-master:
        condition: service_healthy

  # Business API (Port 5002)
  business-api:
    build:
      context: .
      dockerfile: BusinessApi/Dockerfile
    container_name: ecom-business-api
    ports:
      - "5002:5002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5002
      - ConnectionStrings__BusinessConnection=Server=mysql-business;Database=business_db;User=root;Password=P@ssw0rd123;
      - Jwt__SecretKey=Ecom_Microservice_SecretKey_MustBeAtLeast32Characters!2026
      - Jwt__Issuer=Ecom.AuthApi
      - Jwt__Audience=Ecom.Client
      - Kafka__BootstrapServers=host.docker.internal:9093
      - Kafka__LedgerTopic=ledger-change
    depends_on:
      mysql-business:
        condition: service_healthy

  # Order API (Port 5003)
  order-api:
    build:
      context: .
      dockerfile: OrderApi/Dockerfile
    container_name: ecom-order-api
    ports:
      - "5003:5003"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5003
      - ConnectionStrings__BusinessConnection=Server=mysql-business;Database=business_db;User=root;Password=P@ssw0rd123;
      - Jwt__SecretKey=Ecom_Microservice_SecretKey_MustBeAtLeast32Characters!2026
      - Jwt__Issuer=Ecom.AuthApi
      - Jwt__Audience=Ecom.Client
      - Kafka__BootstrapServers=host.docker.internal:9093
      - Kafka__Topic=order-created
    depends_on:
      mysql-business:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # Ledger Worker (Kafka Consumer - ghi sổ tồn kho)
  ledger-worker:
    build:
      context: .
      dockerfile: Workers/LedgerWorker/Dockerfile
    container_name: ecom-ledger-worker
    environment:
      - ConnectionStrings__BusinessConnection=Server=mysql-business;Database=business_db;User=root;Password=P@ssw0rd123;
      - Kafka__BootstrapServers=host.docker.internal:9093
      - Kafka__LedgerTopic=ledger-change
      - Kafka__LedgerGroupId=ledger-worker-group
    depends_on:
      mysql-business:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # Voucher Worker (Kafka Consumer - sinh phiếu xuất kho)
  voucher-worker:
    build:
      context: .
      dockerfile: Workers/VoucherWorker/Dockerfile
    container_name: ecom-voucher-worker
    environment:
      - ConnectionStrings__BusinessConnection=Server=mysql-business;Database=business_db;User=root;Password=P@ssw0rd123;
      - Kafka__BootstrapServers=host.docker.internal:9093
      - Kafka__Topic=order-created
      - Kafka__GroupId=voucher-worker-group
      - Kafka__LedgerTopic=ledger-change
    depends_on:
      mysql-business:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  mysql_master_data:
  mysql_business_data: