replicaCount: 2

image:
  repository: ecom/frontend
  tag: ""
  pullPolicy: IfNotPresent

containerPort: 80
containerName: frontend

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

probes:
  liveness:
    enabled: true
    path: /
    initialDelaySeconds: 10
    periodSeconds: 20
  readiness:
    enabled: true
    path: /
    initialDelaySeconds: 3
    periodSeconds: 10

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80

serviceAccount:
  create: true
