replicaCount: 2

image:
  repository: ecom/auth-api
  tag: ""
  pullPolicy: IfNotPresent

containerPort: 80
containerName: auth-api

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 150m
    memory: 192Mi
  limits:
    cpu: 500m
    memory: 384Mi

env:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:80"
  # Trỏ vào MySQL local trên Windows host (xem infra/charts/ecom-stack/values.yaml → global.localMysql).
  # Helm không render Go template trong values.yaml, nên phải hardcode ở đây.
  # ROLLBACK: Server=ecom-stack-mysqlmaster.ecom.svc.cluster.local;Port=3306;Database=master_db;User=root;Password=P@ssw0rd123;
  ConnectionStrings__Default: "Server=host.minikube.internal;Port=3306;Database=master_db;User=root;Password=Mysql!110720;"

envFromSecret:
  Jwt__SecretKey: "jwt-secret-key"
  Jwt__Issuer: "jwt-issuer"
  Jwt__Audience: "jwt-audience"

probes:
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    enabled: true
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

serviceAccount:
  create: true
  name: ""
