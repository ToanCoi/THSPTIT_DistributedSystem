global:
  imageTag: "v1.0.0-local"
  # MySQL chạy ngoài cluster (trên Windows host) - 6 service sẽ trỏ vào đây.
  # host.minikube.internal là DNS đặc biệt của minikube Docker driver, resolve về host.
  localMysql:
    host: "host.minikube.internal"
    port: 3306
    user: "root"
    password: "Mysql!110720"
    masterDb: "master_db"
    businessDb: "business_db"

# Bật/tắt từng service qua flag
api-gateway:
  enabled: true

auth-api:
  enabled: true

business-api:
  enabled: true

order-api:
  enabled: true

ledger-worker:
  enabled: true

voucher-worker:
  enabled: true

frontend:
  enabled: true

# MySQL trong cluster đã TẮT — dùng local MySQL trên Windows host (xem global.localMysql).
# Block dưới giữ lại (không xóa) để dễ rollback nếu cần bật lại.
mysqlmaster:
  enabled: false
  auth:
    rootPassword: "P@ssw0rd123"
    database: "master_db"
  primary:
    persistence:
      size: 5Gi
    resources:
      requests:
        cpu: 150m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  service:
    type: ClusterIP
  image:
    repository: mysql
    tag: "8.0"

# MySQL business_db (alias mysqlbusiness trong Chart.yaml)
mysqlbusiness:
  enabled: false
  auth:
    rootPassword: "P@ssw0rd123"
    database: "business_db"
  primary:
    persistence:
      size: 5Gi
    resources:
      requests:
        cpu: 150m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  service:
    type: ClusterIP
  image:
    repository: mysql
    tag: "8.0"

# Kafka (KRaft mode - không cần Zookeeper)
# TẮT chart Bitnami vì bitnami/kafka đã bị gỡ khỏi Docker Hub (late 2025).
# Kafka được deploy riêng qua infra/k8s/kafka.yaml (image apache/kafka:3.8.1).
kafka:
  enabled: false
  kraft:
    enabled: true
  replicaCount: 1
  persistence:
    size: 5Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1.5Gi
  service:
    type: ClusterIP

# Cấu hình Secret chung cho JWT
jwt:
  secretKey: "Ecom_Microservice_SecretKey_MustBeAtLeast32Characters!2026"
  issuer: "Ecom.AuthApi"
  audience: "Ecom.Client"

# Ingress
ingress:
  enabled: true
  className: nginx
  host: "ecom.local"
