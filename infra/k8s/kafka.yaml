apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: ecom
  labels:
    app: kafka
data:
  server.properties: |
    process.roles=broker,controller
    node.id=1
    listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
    advertised.listeners=PLAINTEXT://kafka.ecom.svc.cluster.local:9092
    controller.listener.names=CONTROLLER
    listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    controller.quorum.voters=1@kafka-0.kafka-headless.ecom.svc.cluster.local:9093
    inter.broker.listener.name=PLAINTEXT
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
    group.initial.rebalance.delay.ms=0
    log.dirs=/var/lib/kafka/data
    auto.create.topics.enable=true
    num.partitions=1
    default.replication.factor=1
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: ecom
  labels:
    app: kafka
spec:
  ports:
  - port: 9092
    name: client
  - port: 9093
    name: controller
  selector:
    app: kafka
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: ecom
  labels:
    app: kafka
spec:
  ports:
  - port: 9092
    name: client
  - port: 9093
    name: controller
  clusterIP: None
  selector:
    app: kafka
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: ecom
  labels:
    app: kafka
spec:
  serviceName: kafka-headless
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      initContainers:
      - name: format
        image: apache/kafka:3.8.1
        command:
        - /bin/sh
        - -c
        - "/opt/kafka/bin/kafka-storage.sh format -t MkU3OEVBNTcwNTJENDM2Qk -c /etc/kafka/kraft/server.properties --ignore-formatted"
        volumeMounts:
        - name: config
          mountPath: /etc/kafka/kraft/server.properties
          subPath: server.properties
        - name: data
          mountPath: /var/lib/kafka/data
      containers:
      - name: kafka
        image: apache/kafka:3.8.1
        command:
        - /bin/sh
        - -c
        - "exec /opt/kafka/bin/kafka-server-start.sh /etc/kafka/kraft/server.properties"
        ports:
        - containerPort: 9092
          name: client
        - containerPort: 9093
          name: controller
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1.5Gi
        readinessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 15
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: config
          mountPath: /etc/kafka/kraft/server.properties
          subPath: server.properties
        - name: data
          mountPath: /var/lib/kafka/data
      volumes:
      - name: config
        configMap:
          name: kafka-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
